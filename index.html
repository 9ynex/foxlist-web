<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FoxList</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff7f0;
        color: #241c15;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        text-align: center;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 8px;
      }
      p {
        color: #8a7a6d;
        margin-bottom: 24px;
      }
      .buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 320px;
      }
      a.button {
        display: block;
        background: #ff7a1a;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        padding: 14px 24px;
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <h1>🦊 FoxList</h1>
    <p>Get the app to open this list.</p>
    <div class="buttons">
      <!-- TODO: swap for the real App Store link once published; until then, point at an EAS internal-distribution install link -->

      <!-- TODO: swap for the real Play Store link once published; until then, point at an EAS internal-distribution install link -->
      <a class="button" href="#">Download for Android</a>
    </div>
  </body>
</html>
